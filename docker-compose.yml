services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=gulf_monitor
      - POSTGRES_USER=gulf_user
      - POSTGRES_PASSWORD=gulf_pass
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: python -m app.worker
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:${BACKEND_PORT:-8000}
      - VITE_API_KEY=${APP_API_KEY}
    volumes:
      - ./frontend:/web
      - /web/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
